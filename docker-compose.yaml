services:
  mongo:
    image: mongo:7
    container_name: opssage-mongo
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "try { rs.status().ok } catch (e) { rs.initiate({ _id: 'rs0', members: [{ _id: 0, host: 'mongo:27017' }] }).ok }",
        ]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 20s

  knowledge-mcp-server:
    build:
      context: .
      dockerfile: knowledge-mcp-server/Dockerfile
    container_name: opssage-knowledge-mcp-server
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/opssage-knowledge?replicaSet=rs0}
      SERVER_PORT: ${SERVER_PORT:-8082}
      KNOWLEDGE_PAGE_SIZE: ${KNOWLEDGE_PAGE_SIZE:-20}
      KNOWLEDGE_MAX_PAGE_SIZE: ${KNOWLEDGE_MAX_PAGE_SIZE:-100}
    ports:
      - "${SERVER_PORT:-8082}:8082"

volumes:
  mongo-data:
