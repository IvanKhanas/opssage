services:
  mongo:
    image: mongodb/mongodb-atlas-local:8.0
    container_name: opssage-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb

  knowledge-mcp-server:
    build:
      context: .
      dockerfile: knowledge-mcp-server/Dockerfile
    container_name: opssage-knowledge-mcp-server
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/opssage-knowledge?directConnection=true}
      SERVER_PORT: ${SERVER_PORT:-8082}
      KNOWLEDGE_PAGE_SIZE: ${KNOWLEDGE_PAGE_SIZE:-20}
      KNOWLEDGE_MAX_PAGE_SIZE: ${KNOWLEDGE_MAX_PAGE_SIZE:-100}
      FACT_VECTOR_INDEX: ${FACT_VECTOR_INDEX:-fact-vector-index}
      FACT_VECTOR_DIMENSIONS: ${FACT_VECTOR_DIMENSIONS:-384}
      FACT_VECTOR_CANDIDATES_MULTIPLIER: >-
        ${FACT_VECTOR_CANDIDATES_MULTIPLIER:-20}
      FACT_EMBED_CONCURRENCY: ${FACT_EMBED_CONCURRENCY:-4}
      FACT_BACKFILL_TIMEOUT: ${FACT_BACKFILL_TIMEOUT:-5m}
      MCP_CALL_TIMEOUT: ${MCP_CALL_TIMEOUT:-30s}
    ports:
      - "${SERVER_PORT:-8082}:8082"

volumes:
  mongo-data:
  mongo-config:
