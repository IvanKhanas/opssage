services:
  victoria-metrics:
    image: victoriametrics/victoria-metrics:v1.144.0
    restart: unless-stopped
    ports:
      - "${VICTORIA_METRICS_PORT:-8428}:8428"
    volumes:
      - victoria_metrics_data:/victoria-metrics-data
    networks:
      - opssage_internal

  victoria-logs:
    image: victoriametrics/victoria-logs:v1.50.0
    restart: unless-stopped
    ports:
      - "${VICTORIA_LOGS_PORT:-9428}:9428"
    volumes:
      - victoria_logs_data:/victoria-logs-data
    networks:
      - opssage_internal

  victoria-traces:
    image: victoriametrics/victoria-traces:v0.9.2
    restart: unless-stopped
    ports:
      - "${VICTORIA_TRACES_PORT:-10428}:10428"
    volumes:
      - victoria_traces_data:/victoria-traces-data
    networks:
      - opssage_internal

volumes:
  victoria_metrics_data:
  victoria_logs_data:
  victoria_traces_data:
